<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Password Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Password Manager</h1>

        <!-- Add Password Form -->
        <div class="card">
            <h2>Add Account</h2>

            <input type="text" id="website" placeholder="Website Name">
            <input type="text" id="username" placeholder="Username or Email">

            <div class="password-box">
                <input type="password" id="password" placeholder="Enter Password">
                <button onclick="togglePassword()">Show</button>
            </div>

            <p id="strengthText">Password Strength: </p>

            <button onclick="checkStrength()">Check Strength</button>
            <button onclick="generatePassword()">Generate Password</button>
            <button onclick="savePassword()">Save Password</button>
        </div>

        <!-- Search Section -->
        <div class="card">
            <h2>Saved Accounts</h2>

            <input type="text" id="search" placeholder="Search Website" onkeyup="searchPassword()">

            <table>
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Username</th>
                        <th>Password</th>
                    </tr>
                </thead>

                <tbody id="passwordList">
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
